version: "3.9"

services:
  postgres:
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    ports: []

  redis:
    ports: []

  minio:
    ports: []

  api:
    environment:
      APP_ENV: production
      CORS_ORIGINS: "https://welldom05.duckdns.org"
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: https://welldom05.duckdns.org/s3
      S3_BUCKET: welldom-photos
    ports: []
    volumes: []

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ../frontend:/srv/frontend
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

secrets:
  db_password:
    file: ../secrets/db_password.txt
